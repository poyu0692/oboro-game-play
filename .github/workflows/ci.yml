name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: GDUnit4 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      - name: Import project
        run: godot --headless --path . --import 2>&1 || true

      - name: Run GDUnit4 tests
        run: |
          godot --headless --path . \
            -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            -a res://tests \
            --report-path ./reports
        continue-on-error: false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
