name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create addon archive
        run: |
          zip -r oboro-${{ github.ref_name }}.zip addons/oboro/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: oboro-${{ github.ref_name }}.zip
          generate_release_notes: true
